[pytest]
# Pytest configuration for NKIPyKernelGen

# LIT FileCheck tests under tests/python/ are run via `lit`, not pytest
norecursedirs = tests/python tests/legacy

# Test paths
testpaths = tests

# Verbose output
addopts = -v --tb=short

# Custom markers
markers =
    llvm_sim: LLVM JIT simulation test (CPU, no device required)
    bir_sim: BIR simulation test (CPU, no device required)
    device: test requires Trainium hardware
    trn1: test targets Trainium v1
    trn2: test targets Trainium v2
    trn3: test targets Trainium v3
    e2e: end-to-end pipeline test
    passes: MLIR pass transformation test
    unit: unit test for individual operations and features
