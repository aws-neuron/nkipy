# Alternative configuration using a custom language definition
# This gives more control over syntax highlighting and behavior

# Register NKIPy as a language (instead of using Python)
languages=&nkipy

# Language definition
language.nkipy.name=NKIPy
language.nkipy.monaco=python
language.nkipy.extensions=.py
language.nkipy.alias=nkipy
language.nkipy.example=nkipy/example.nkipy

# Compiler definition
compilers=&nkipy-mlir

compiler.nkipy-mlir.exe=/path/to/NKIPyKernelGen/compiler_explorer/nkipy_ce_wrapper.sh
compiler.nkipy-mlir.name=NKIPy to MLIR
compiler.nkipy-mlir.lang=nkipy
compiler.nkipy-mlir.compilerType=
compiler.nkipy-mlir.options=
compiler.nkipy-mlir.supportsBinary=false
compiler.nkipy-mlir.supportsExecute=false

# Define available compiler options that show in dropdown
compiler.nkipy-mlir.options.--stop=0=Trace only (no passes)
compiler.nkipy-mlir.options.--stop=7=Stop after tiling
compiler.nkipy-mlir.options.--stop=10=Stop after bufferization
compiler.nkipy-mlir.options.--stop=16=Stop after memory space annotation
compiler.nkipy-mlir.options.--stop=17=Stop after layout legalization
compiler.nkipy-mlir.options.--stop=24=Full compilation (NISA lowering)
