# Compiler Explorer local configuration for NKIPy MLIR compiler
#
# Place this file in compiler-explorer/etc/config/ directory
# or merge with your existing local configuration

# Define NKIPy as a compiler for Python language
compilers=&nkipy

# NKIPy compiler definition
compiler.nkipy.exe=/path/to/NKIPyKernelGen/compiler_explorer/nkipy_ce_wrapper.sh
compiler.nkipy.name=NKIPy MLIR
compiler.nkipy.lang=python
compiler.nkipy.compilerType=
compiler.nkipy.notification=NKIPy compiles Python+NumPy to NISA MLIR
compiler.nkipy.options=--pass=final
compiler.nkipy.supportsBinary=false
compiler.nkipy.supportsExecute=false
